<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex"><title>레픽 스케줄</title>
<style>
:root{--ink:#1f2937;--mut:#6b7280;--line:#e5e7eb;--brand:#2563eb;--bg:#f8fafc}
*{box-sizing:border-box}body{margin:0;font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink)}
header{background:#fff;border-bottom:1px solid var(--line);padding:12px 18px;position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
h1{font-size:17px;margin:0;font-weight:800}.sub{color:var(--mut);font-size:12px}
.spacer{margin-left:auto}.btn{padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:13px}
.btn.pri{background:var(--brand);color:#fff;border-color:var(--brand)}.btn:disabled{opacity:.5;cursor:not-allowed}
.wrap{padding:16px;max-width:1200px;margin:0 auto}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 14px;border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;font-size:13px}
.tab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;flex:1;min-width:110px}
.card .n{font-size:24px;font-weight:800}.card .l{font-size:12px;color:var(--mut)}
.gridwrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:auto}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{border:1px solid var(--line);padding:0;text-align:center;white-space:nowrap}
thead th{background:#f1f5f9;position:sticky;top:0;padding:8px 6px}thead th.we{color:#dc2626}
.namecell{text-align:left;padding:7px 10px;position:sticky;left:0;background:#fff;min-width:128px}
.namecell .rk{color:var(--mut);font-size:11px}.teamcell{position:sticky;left:0;background:#eef2ff;font-weight:700;text-align:left;padding:6px 10px;color:#3730a3}
.nat{display:inline-block;font-size:10px;padding:1px 5px;border-radius:10px;background:#eef2ff;color:#4338ca;margin-left:4px}
select.st{border:0;width:100%;height:34px;font-size:12.5px;text-align:center;text-align-last:center;background:transparent;font-family:inherit}
select.st:not([disabled]){cursor:pointer}
td.s근무{background:#eaf7ee}td.s근무 select{color:#15803d}
td.sOFF{background:#eef0f2}td.sOFF select{color:#6b7280}
td.s연차{background:#dbeafe}td.s연차 select{color:#1d4ed8;font-weight:700}
td.s오전반차,td.s오후반차{background:#ede9fe}td.s오전반차 select,td.s오후반차 select{color:#7c3aed;font-weight:700}
td.s공휴일{background:#fee2e2}td.s병가{background:#ffedd5}td.s경조{background:#fce7f3}
.box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.box h3{margin:0 0 12px;font-size:15px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px;gap:8px}
input,select.fld{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px}
.center{min-height:70vh;display:flex;align-items:center;justify-content:center}
.auth{background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px;width:340px}
.auth h2{margin:0 0 4px}.auth p{color:var(--mut);font-size:13px;margin:0 0 18px}
.auth input{width:100%;margin-bottom:10px}.auth .btn{width:100%;margin-bottom:8px}
.legend{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}.lg{font-size:11px;padding:3px 8px;border-radius:6px}
.msg{font-size:13px;color:#b91c1c;min-height:18px}.ok{color:#16a34a}
.pill{font-size:11px;padding:2px 9px;border-radius:20px;background:#f1f5f9;color:#475569}
.hidden{display:none}
</style></head><body>
<div id="app"><div class="center"><div class="sub">로딩 중…</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js?v=3"></script>
<script src="./app.js?v=3"></script>
</body></html>
